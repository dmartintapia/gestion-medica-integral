services:
  - type: web
    name: gmi-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: gmi-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: APP_ENCRYPTION_KEY
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_MIN
        value: "15"
      - key: JWT_REFRESH_EXPIRES_DAYS
        value: "7"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: CORS_ALLOWLIST
        sync: false

databases:
  - name: gmi-postgres
    plan: free
    databaseName: gmi
    user: gmi
